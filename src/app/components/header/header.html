<header class="header glass-panel">
  <div class="header-container container">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo-icon">🍲</span>
      <span class="logo-text">Sabor <span class="accent-text">Chentuino</span></span>
    </a>

    <button class="nav-toggle" (click)="toggleMenu()" aria-label="Toggle menu" [class.active]="isMenuOpen">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav class="nav-menu" [class.open]="isMenuOpen">
      <ul class="nav-list">
        <li class="nav-item">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()" class="nav-link">Inicio</a>
        </li>
        <li class="nav-item">
          <a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Menú</a>
        </li>
        <li class="nav-item">
          <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Contacto & Reservas</a>
        </li>
      </ul>
      <div class="nav-cta">
        <a routerLink="/contacto" (click)="closeMenu()" class="btn btn-primary btn-nav">Reservar Mesa</a>
      </div>
    </nav>
  </div>
</header>
